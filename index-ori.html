<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Jurnal Mengajar & LKH</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>Generator Jurnal Mengajar & Laporan Kinerja Harian</h1>
        <p>Versi 0.1</p>
    </header>

    <!-- ===================== DATA GURU ===================== -->

    <section>

        <h2>Data Guru</h2>

        <div class="form-group">
            <label>Nama Guru</label>
            <input type="text" id="namaGuru">
        </div>

        <div class="form-group">
            <label>NIP</label>
            <input type="text" id="nipGuru">
        </div>

        <div class="form-group">
            <label>Status Guru</label>
            <input type="text" id="statusGuru">
        </div>

        <div class="form-group">
            <label>No Sertifikasi</label>
            <input type="text" id="noSertifikasi">
        </div>

        <div class="form-group">
            <label>Pangkat / Golongan</label>
            <input type="text" id="pangkat">
        </div>

        <div class="form-group">
            <label>Pendidikan</label>
            <input type="text" id="pendidikan">
        </div>

    </section>

    <!-- ===================== MADRASAH ===================== -->

    <section>

        <h2>Data Madrasah</h2>

        <div class="form-group">
            <label>Nama Madrasah</label>
            <input type="text" id="namaMadrasah">
        </div>

        <div class="form-group">
            <label>NPSN</label>
            <input type="text" id="npsn">
        </div>

        <div class="form-group">
            <label>NSM</label>
            <input type="text" id="nsm">
        </div>

        <div class="form-group">
            <label>Alamat</label>
            <textarea id="alamatMadrasah" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label>Jumlah Ruang</label>
            <input type="text" id="jumlahRuang">
        </div>

        <div class="form-group">
            <label>Status Madrasah</label>
            <input type="text" id="statusMadrasah">
        </div>

        <div class="form-group">
            <label>Internet</label>
            <input type="text" id="internet">
        </div>

    </section>

    <!-- ===================== PENGESAHAN ===================== -->

    <section>

        <h2>Pengesahan</h2>

        <div class="form-group">
            <label>Nama Kepala Madrasah</label>
            <input type="text" id="kepalaMadrasah">
        </div>

        <div class="form-group">
            <label>NIP Kepala</label>
            <input type="text" id="nipKepala">
        </div>

        <div class="form-group">
            <label>Tempat</label>
            <input type="text" id="tempat">
        </div>

        <div class="form-group">
            <label>Bulan</label>
            <input type="text" id="bulan">
        </div>

        <div class="form-group">
            <label>Tahun</label>
            <input type="number" id="tahun" value="2026">
        </div>

    </section>

    <!-- ===================== TEMPLATE ===================== -->

    <section>

        <h2>Template Excel</h2>

        <div class="form-group">
            <input
                type="file"
                id="excelFile"
                accept=".xlsx,.xls">
        </div>

        <div id="statusExcel">
            Belum ada file dipilih.
        </div>

    </section>

    <!-- ===================== TOMBOL ===================== -->

    <section>

        <button id="btnPreview">
            Preview PDF
        </button>

        <button id="btnDownload" disabled>
            Download PDF
        </button>

    </section>

</div>


<!-- Library -->

<script src="lib/xlsx.full.min.js"></script>
<script src="lib/jspdf.umd.min.js"></script>

<!-- Script -->

<script src="js/excel.js"></script>
<script src="js/pdf.js"></script>
<script src="js/app.js"></script>

</body>
</html>
