<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>LKH Generator</title>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- SheetJS untuk baca Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- File pdf.js kamu -->
  <script src="pdf.js"></script>
</head>
<body>
  <h2>Form Data Guru & Madrasah</h2>
  <form id="formData">
    Nama Guru: <input type="text" name="namaGuru"><br>
    NIP: <input type="text" name="nipGuru"><br>
    Status Guru: <input type="text" name="statusGuru"><br>
    No Sertifikasi: <input type="text" name="noSertifikasi"><br>
    Pangkat: <input type="text" name="pangkat"><br>
    Pendidikan: <input type="text" name="pendidikan"><br>
    Nama Madrasah: <input type="text" name="namaMadrasah"><br>
    NPSN: <input type="text" name="npsn"><br>
    NSM: <input type="text" name="nsm"><br>
    Status Madrasah: <input type="text" name="statusMadrasah"><br>
    Internet: <input type="text" name="internet"><br>
    Tempat: <input type="text" name="tempat"><br>
    Bulan: <input type="text" name="bulan"><br>
    Tahun: <input type="text" name="tahun"><br>
    Kepala Madrasah: <input type="text" name="kepalaMadrasah"><br>
    NIP Kepala: <input type="text" name="nipKepala"><br>
  </form>

  <h3>Upload Excel</h3>
  <input type="file" id="excelFile" accept=".xlsx,.xls">

  <br><br>
  <button id="generateBtn">Generate PDF</button>

  <script>
    // fungsi bantu: ambil data form
    function getFormData() {
      const form = document.getElementById("formData");
      const data = {};
      for (let el of form.elements) {
        if (el.name) data[el.name] = el.value;
      }
      return data;
    }

    // fungsi bantu: baca Excel
    async function readExcel(file) {
      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data);
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      return XLSX.utils.sheet_to_json(sheet, {header:1});
    }

    // tombol generate
    document.getElementById("generateBtn").addEventListener("click", async () => {
      const formData = getFormData();
      const file = document.getElementById("excelFile").files[0];
      if (!file) {
        alert("Upload file Excel dulu!");
        return;
      }
      const excelData = await readExcel(file);
      const blob = await buatPDF(formData, excelData);

      // download hasil
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "LKH.pdf";
      a.click();
    });
  </script>
</body>
</html>
